<!doctype html>
<html lang="en" data-theme="dark" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EZ IPTV</title>
    <script>
      (() => {
        const cachedTheme = window.localStorage.getItem("eziptv-theme");
        if (cachedTheme === "dark" || cachedTheme === "light") {
          document.documentElement.dataset.theme = cachedTheme;
          document.documentElement.dataset.bsTheme = cachedTheme;
        }
      })();
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body class="app-shell">
    <nav class="navbar navbar-expand-lg app-navbar shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('pages.index') }}">EZ IPTV</a>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <div class="d-flex align-items-center gap-2">
            <button
              class="btn btn-link nav-theme-toggle"
              type="button"
              id="theme-toggle"
              aria-label="Toggle color theme"
              title="Toggle color theme"
            >
              <span class="nav-theme-toggle-icon" id="theme-toggle-icon" aria-hidden="true"></span>
            </button>
          </div>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#main-nav"
            aria-controls="main-nav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div class="collapse navbar-collapse" id="main-nav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link {% if page_name == 'library' %}active{% endif %}" href="{{ url_for('pages.index') }}">Library</a>
            <a class="nav-link {% if page_name == 'settings' %}active{% endif %}" href="{{ url_for('pages.settings') }}">Settings</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="py-4">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="{{ url_for('static', filename='js/theme.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
